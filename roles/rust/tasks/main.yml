---
# Rust role - Install a pinned Rust toolchain and Cargo via rustup

- name: Install Rust build dependencies (Linux)
  ansible.builtin.apt:
    name:
      - build-essential
      - ca-certificates
      - curl
      - libssl-dev
      - pkg-config
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_os_family == "Debian"

- name: Check if rustup is installed
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.cargo/bin/rustup"
  register: rust_rustup_binary

- name: Check for the configured Rust toolchain
  ansible.builtin.command:
    argv:
      - "{{ ansible_env.HOME }}/.cargo/bin/rustup"
      - run
      - "{{ rust_version }}"
      - rustc
      - --version
  register: rust_toolchain_check
  changed_when: false
  failed_when: false
  check_mode: false
  when: rust_rustup_binary.stat.exists

- name: Download rustup installer
  ansible.builtin.get_url:
    url: https://sh.rustup.rs
    dest: /tmp/rustup-init.sh
    mode: "0755"
    force: true
    timeout: 30
  when:
    - not rust_rustup_binary.stat.exists
    - not ansible_check_mode

- name: Install rustup with the configured Rust toolchain
  ansible.builtin.command:
    argv:
      - sh
      - /tmp/rustup-init.sh
      - -y
      - --no-modify-path
      - --profile
      - default
      - --default-toolchain
      - "{{ rust_version }}"
  environment:
    CARGO_HOME: "{{ ansible_env.HOME }}/.cargo"
    RUSTUP_HOME: "{{ ansible_env.HOME }}/.rustup"
  when:
    - not rust_rustup_binary.stat.exists
    - not ansible_check_mode

- name: Install the configured Rust toolchain with rustup
  ansible.builtin.command:
    argv:
      - "{{ ansible_env.HOME }}/.cargo/bin/rustup"
      - toolchain
      - install
      - "{{ rust_version }}"
      - --profile
      - default
  when:
    - rust_rustup_binary.stat.exists
    - rust_toolchain_check.rc != 0
    - not ansible_check_mode

- name: Get the default Rust toolchain
  ansible.builtin.command:
    argv:
      - "{{ ansible_env.HOME }}/.cargo/bin/rustup"
      - default
  register: rust_default_toolchain
  changed_when: false
  when: not ansible_check_mode

- name: Set the configured Rust toolchain as default
  ansible.builtin.command:
    argv:
      - "{{ ansible_env.HOME }}/.cargo/bin/rustup"
      - default
      - "{{ rust_version }}"
  when:
    - not ansible_check_mode
    - rust_version not in rust_default_toolchain.stdout

- name: Remove rustup installer
  ansible.builtin.file:
    path: /tmp/rustup-init.sh
    state: absent

- name: Add Cargo binaries to shell PATH
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/{{ rust_shell_file }}"
    line: 'export PATH="$HOME/.cargo/bin:$PATH"'
    state: present
    create: true
    mode: "0644"
  loop:
    - .bashrc
    - .profile
    - .zshrc
  loop_control:
    loop_var: rust_shell_file

- name: Get installed Rust version
  ansible.builtin.command: "{{ ansible_env.HOME }}/.cargo/bin/rustc --version"
  environment:
    RUSTUP_TOOLCHAIN: "{{ rust_version }}"
  register: rust_version_output
  changed_when: false
  failed_when: false
  when: not ansible_check_mode

- name: Get installed Cargo version
  ansible.builtin.command: "{{ ansible_env.HOME }}/.cargo/bin/cargo --version"
  environment:
    RUSTUP_TOOLCHAIN: "{{ rust_version }}"
  register: rust_cargo_version_output
  changed_when: false
  failed_when: false
  when: not ansible_check_mode

- name: Verify Rust and Cargo installation
  ansible.builtin.assert:
    that:
      - rust_version_output.rc == 0
      - "'rustc ' ~ rust_version in rust_version_output.stdout"
      - rust_cargo_version_output.rc == 0
      - rust_cargo_version_output.stdout is match('^cargo [0-9]+\\.[0-9]+\\.[0-9]+')
    fail_msg: "Rust {{ rust_version }} or Cargo was not installed correctly. rustc: '{{ rust_version_output.stdout | default('missing') }}'; cargo: '{{ rust_cargo_version_output.stdout | default('missing') }}'"
    success_msg: "Installed {{ rust_version_output.stdout }} and {{ rust_cargo_version_output.stdout }}"
  when: not ansible_check_mode
