---
# Git role - Configure global gitignore
# User-specific settings (name, email) should be configured manually

- name: Ensure git config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/git"
    state: directory
    mode: '0755'

- name: Deploy global gitignore
  ansible.builtin.copy:
    src: gitignore_global
    dest: "{{ ansible_env.HOME }}/.config/git/ignore"
    mode: '0644'

- name: Configure git to use global gitignore
  community.general.git_config:
    name: core.excludesFile
    value: "{{ ansible_env.HOME }}/.config/git/ignore"
    scope: global

- name: Configure git global defaults
  community.general.git_config:
    name: "{{ git_setting.name }}"
    value: "{{ git_setting.value }}"
    scope: global
  loop:
    - { name: "init.defaultBranch", value: "main" }
    - { name: "pull.rebase", value: "true" }
    - { name: "merge.conflictstyle", value: "zdiff3" }
    - { name: "diff.colorMoved", value: "default" }
    - { name: "core.pager", value: "delta --light" }
    - { name: "interactive.diffFilter", value: "delta --light --color-only" }
    - { name: "delta.navigate", value: "true" }
    - { name: "delta.line-numbers", value: "true" }
    - { name: "delta.light", value: "true" }
  loop_control:
    loop_var: git_setting
