---
# Git role - Configure global gitignore
# User-specific settings (name, email) should be configured manually

- name: Ensure git config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/git"
    state: directory
    mode: '0755'

- name: Deploy global gitignore
  ansible.builtin.copy:
    src: gitignore_global
    dest: "{{ ansible_env.HOME }}/.config/git/ignore"
    mode: '0644'

- name: Configure git to use global gitignore
  community.general.git_config:
    name: core.excludesFile
    value: "{{ ansible_env.HOME }}/.config/git/ignore"
    scope: global
