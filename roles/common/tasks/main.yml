---
# Common role - Install essential CLI tools and utilities

- name: Update apt cache (Linux)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_os_family == "Debian"

- name: Install common CLI tools (Linux)
  ansible.builtin.package:
    name:
      - git
      - curl
      - wget
      - unzip
      - tmux
      - build-essential
      - ca-certificates
      - gnupg
      - lsb-release
      - apt-transport-https
      - make
      - jq
      - fzf
      - ripgrep
      - fd-find
      - libimage-exiftool-perl
    state: present
  become: true
  when: ansible_os_family == "Debian"

- name: Check optional CLI package availability (Linux)
  ansible.builtin.command: "apt-cache show {{ common_optional_cli_package }}"
  loop:
    - bat
    - btop
    - git-delta
    - mkcert
    - tldr
    - yq
    - zoxide
  loop_control:
    loop_var: common_optional_cli_package
  register: common_optional_package_checks
  changed_when: false
  failed_when: false
  when: ansible_os_family == "Debian"

- name: Set available optional CLI packages (Linux)
  ansible.builtin.set_fact:
    common_available_optional_packages: "{{ common_optional_package_checks.results | selectattr('rc', 'eq', 0) | map(attribute='common_optional_cli_package') | list }}"
    common_unavailable_optional_packages: "{{ common_optional_package_checks.results | rejectattr('rc', 'eq', 0) | map(attribute='common_optional_cli_package') | list }}"
  when: ansible_os_family == "Debian"

- name: Install optional CLI tools available in apt repositories (Linux)
  ansible.builtin.package:
    name: "{{ common_available_optional_packages }}"
    state: present
  become: true
  when:
    - ansible_os_family == "Debian"
    - common_available_optional_packages | length > 0

- name: Report optional CLI tools missing from apt repositories (Linux)
  ansible.builtin.debug:
    msg: "Skipping optional apt packages unavailable on {{ ansible_distribution }} {{ ansible_distribution_version }}: {{ common_unavailable_optional_packages | join(', ') }}"
  when:
    - ansible_os_family == "Debian"
    - common_unavailable_optional_packages | length > 0

- name: Ensure ~/.local/bin is on PATH in .bashrc
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.bashrc"
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    state: present
    create: true
    mode: '0644'

- name: Ensure ~/.local/bin is on PATH in .profile
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.profile"
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    state: present
    create: true
    mode: '0644'

- name: Create /etc/apt/keyrings directory (Linux)
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true
  when: ansible_os_family == "Debian"

- name: Download and dearmor Charm signing key (Linux)
  ansible.builtin.shell: |
    curl -fsSL https://repo.charm.sh/apt/gpg.key | gpg --dearmor -o /etc/apt/keyrings/charm.gpg
  args:
    creates: /etc/apt/keyrings/charm.gpg
  become: true
  when: ansible_os_family == "Debian"

- name: Add Charm apt repository (Linux)
  ansible.builtin.deb822_repository:
    name: charm
    types: [deb]
    uris: ['https://repo.charm.sh/apt/']
    suites: ['*']
    components: ['*']
    signed_by: /etc/apt/keyrings/charm.gpg
    state: present
  become: true
  register: charm_repo_added
  when: ansible_os_family == "Debian"

- name: Update apt cache after adding Charm repo (Linux)
  ansible.builtin.apt:
    update_cache: true
  become: true
  when: ansible_os_family == "Debian" and charm_repo_added is changed

- name: Install glow (Linux)
  ansible.builtin.package:
    name: glow
    state: present
  become: true
  when: ansible_os_family == "Debian"

- name: Install common CLI tools (macOS)
  community.general.homebrew:
    name:
      - git
      - curl
      - wget
      - unzip
      - btop
      - tmux
      - ca-certificates
      - gnupg
      - make
      - jq
      - fzf
      - ripgrep
      - fd
      - git-delta
      - exiftool
      - mkcert
      - glow
      - bat
      - eza
      - zoxide
      - yq
      - tldr
    state: present
  when: ansible_os_family == "Darwin"

- name: Create batcat symlink (Linux - Debian/Ubuntu package installs as batcat)
  ansible.builtin.file:
    src: /usr/bin/batcat
    dest: /usr/local/bin/bat
    state: link
  become: true
  when: ansible_os_family == "Debian"
  failed_when: false

- name: Set eza platform architecture
  ansible.builtin.set_fact:
    eza_arch: "{{ 'x86_64' if ansible_architecture == 'x86_64' else 'aarch64' }}"
  when: ansible_os_family == "Debian"

- name: Check if eza is installed
  ansible.builtin.stat:
    path: /usr/local/bin/eza
  register: eza_binary
  when: ansible_os_family == "Debian"

- name: Get installed eza version
  ansible.builtin.command: /usr/local/bin/eza --version
  register: installed_eza_version
  changed_when: false
  failed_when: false
  when: ansible_os_family == "Debian" and eza_binary.stat.exists

- name: Set eza needs installation flag
  ansible.builtin.set_fact:
    eza_needs_install: "{{ not eza_binary.stat.exists or eza_version not in (installed_eza_version.stdout | default('')) }}"
  when: ansible_os_family == "Debian"

- name: Download eza (Linux)
  ansible.builtin.get_url:
    url: "https://github.com/eza-community/eza/releases/download/v{{ eza_version }}/eza_{{ eza_arch }}-unknown-linux-gnu.tar.gz"
    dest: "/tmp/eza_{{ eza_version }}.tar.gz"
    mode: "0644"
    timeout: 30
  when: ansible_os_family == "Debian" and eza_needs_install

- name: Extract eza (Linux)
  ansible.builtin.unarchive:
    src: "/tmp/eza_{{ eza_version }}.tar.gz"
    dest: /usr/local/bin
    remote_src: true
  become: true
  when: ansible_os_family == "Debian" and eza_needs_install

- name: Ensure eza is executable
  ansible.builtin.file:
    path: /usr/local/bin/eza
    mode: "0755"
  become: true
  when: ansible_os_family == "Debian" and eza_needs_install

- name: Clean up eza tarball
  ansible.builtin.file:
    path: "/tmp/eza_{{ eza_version }}.tar.gz"
    state: absent
  when: ansible_os_family == "Debian" and eza_needs_install

- name: Create fd symlink (Linux - Debian/Ubuntu package installs as fdfind)
  ansible.builtin.file:
    src: /usr/bin/fdfind
    dest: /usr/local/bin/fd
    state: link
  become: true
  when: ansible_os_family == "Debian"

- name: Install software-properties-common (Ubuntu/Pop!_OS)
  ansible.builtin.package:
    name: software-properties-common
    state: present
  become: true
  when: ansible_distribution in ["Ubuntu", "Pop!_OS"]

- name: Ensure /usr/local/bin exists
  ansible.builtin.file:
    path: /usr/local/bin
    state: directory
    mode: "0755"
  become: true

- name: Check if lazygit is installed
  ansible.builtin.stat:
    path: /usr/local/bin/lazygit
  register: lazygit_binary

- name: Get installed lazygit version
  ansible.builtin.command: /usr/local/bin/lazygit --version
  register: installed_lazygit_version
  changed_when: false
  failed_when: false
  when: lazygit_binary.stat.exists

- name: Set lazygit needs installation flag
  ansible.builtin.set_fact:
    lazygit_needs_install: "{{ not lazygit_binary.stat.exists or lazygit_version not in (installed_lazygit_version.stdout | default('')) }}"

- name: Set platform and architecture for lazygit
  ansible.builtin.set_fact:
    lazygit_platform: "{{ 'Darwin' if ansible_os_family == 'Darwin' else 'Linux' }}"
    lazygit_arch: "{{ 'x86_64' if arch_map[ansible_architecture] == 'amd64' else 'arm64' }}"

- name: Download lazygit
  ansible.builtin.get_url:
    url: "https://github.com/jesseduffield/lazygit/releases/download/v{{ lazygit_version }}/lazygit_{{ lazygit_version }}_{{ lazygit_platform }}_{{ lazygit_arch }}.tar.gz"
    dest: "/tmp/lazygit_{{ lazygit_version }}.tar.gz"
    mode: "0644"
    timeout: 30
  when: lazygit_needs_install

- name: Check if lazygit tarball was downloaded
  ansible.builtin.stat:
    path: "/tmp/lazygit_{{ lazygit_version }}.tar.gz"
  register: lazygit_tarball_stat

- name: Extract lazygit (macOS)
  ansible.builtin.shell: |
    tar -xzf "/tmp/lazygit_{{ lazygit_version }}.tar.gz" -C /usr/local/bin lazygit
  become: true
  when: lazygit_needs_install and lazygit_tarball_stat.stat.exists and ansible_os_family == "Darwin"

- name: Extract lazygit (Linux)
  ansible.builtin.unarchive:
    src: "/tmp/lazygit_{{ lazygit_version }}.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    include:
      - lazygit
  become: true
  when: lazygit_needs_install and lazygit_tarball_stat.stat.exists and ansible_os_family == "Debian"

- name: Ensure lazygit is executable
  ansible.builtin.file:
    path: /usr/local/bin/lazygit
    mode: "0755"
  become: true
  when: lazygit_needs_install and lazygit_tarball_stat.stat.exists

- name: Clean up lazygit tarball
  ansible.builtin.file:
    path: "/tmp/lazygit_{{ lazygit_version }}.tar.gz"
    state: absent
  when: lazygit_needs_install and lazygit_tarball_stat.stat.exists

- name: Ensure sudo has correct ownership and setuid permissions (Linux)
  ansible.builtin.file:
    path: /usr/bin/sudo
    owner: root
    group: root
    mode: "4755"
  become: true
  when: ansible_os_family == "Debian"

- name: Ensure ~/.config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config"
    state: directory
    mode: "0755"
