---
# Phpactor role - Install Phpactor (PHP language server / refactoring tool)
# Documentation: https://phpactor.readthedocs.io/en/master/usage/standalone.html

- name: Check if Phpactor is installed
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.local/bin/phpactor"
  register: phpactor_stat

- name: Ensure ~/.local/bin directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/bin"
    state: directory
    mode: '0755'

- name: Download Phpactor PHAR
  ansible.builtin.get_url:
    url: https://github.com/phpactor/phpactor/releases/latest/download/phpactor.phar
    dest: "{{ ansible_env.HOME }}/.local/bin/phpactor"
    mode: '0755'
    timeout: 30
  when: not phpactor_stat.stat.exists

- name: Verify Phpactor installation
  ansible.builtin.command: phpactor --version
  register: phpactor_version_output
  changed_when: false
  failed_when: false

- name: Display Phpactor version
  ansible.builtin.debug:
    msg: "Phpactor installed: {{ phpactor_version_output.stdout }}"
  when: not ansible_check_mode and phpactor_version_output.rc == 0 and phpactor_version_output.stdout | default('') | length > 0
