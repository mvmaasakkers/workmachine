---
# Install Claude Code CLI using the official installer
# Documentation: https://code.claude.com/docs/en/overview
# Uses the same official installer on both macOS and Linux for consistency
# Installs to ~/.local/bin/claude (symlink to ~/.local/share/claude/versions/*)

# Clean up old npm/nvm/Homebrew installations (not the official installer)
- name: Remove old Claude Code npm/nvm installations
  ansible.builtin.shell: |
    set -euo pipefail
    shopt -s nullglob
    rm -rf /opt/homebrew/lib/node_modules/@anthropic-ai
    export NVM_DIR="{{ ansible_env.HOME }}/.nvm"
    if [ -s "$NVM_DIR/nvm.sh" ]; then
      . "$NVM_DIR/nvm.sh"
      npm uninstall -g @anthropic-ai/claude-code 2>/dev/null || true
    fi
    for dir in {{ ansible_env.HOME }}/.nvm/versions/node/*/lib/node_modules/@anthropic-ai; do
      rm -rf "$dir"
    done
    for bin in {{ ansible_env.HOME }}/.nvm/versions/node/*/bin/claude; do
      rm -f "$bin"
    done
  args:
    executable: /bin/bash
  changed_when: false

- name: Remove old Homebrew cask Claude Code installation (macOS)
  ansible.builtin.shell: |
    if brew list --cask claude-code &>/dev/null; then
      brew uninstall --cask claude-code
    fi
  args:
    executable: /bin/bash
  register: homebrew_cask_removal
  changed_when: "'Uninstalling' in homebrew_cask_removal.stdout"
  when: ansible_os_family == "Darwin"

- name: Remove system-level Claude Code installations
  ansible.builtin.file:
    path: /usr/local/bin/claude
    state: absent
  become: true

# Install via official installer (same method on both macOS and Linux)
- name: Install Claude Code via official installer
  ansible.builtin.shell: |
    curl -fsSL https://claude.ai/install.sh | bash
  args:
    executable: /bin/bash
    creates: "{{ ansible_env.HOME }}/.local/bin/claude"
  when: not ansible_check_mode

# Global settings: strip Claude attribution from commits, PRs, and session URLs.
# Merged into any existing settings.json so machine-local settings survive.
- name: Ensure ~/.claude directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.claude"
    state: directory
    mode: '0755'

- name: Check for existing Claude settings
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.claude/settings.json"
  register: claude_settings_stat

- name: Read existing Claude settings
  ansible.builtin.slurp:
    src: "{{ ansible_env.HOME }}/.claude/settings.json"
  register: claude_settings_raw
  when: claude_settings_stat.stat.exists

- name: Merge attribution settings into global Claude settings
  vars:
    claude_attribution_settings:
      attribution:
        commit: ""
        pr: ""
        sessionUrl: false
    claude_existing_settings: "{{ (claude_settings_raw.content | b64decode | from_json) if claude_settings_stat.stat.exists else {} }}"
  ansible.builtin.copy:
    content: "{{ claude_existing_settings | combine(claude_attribution_settings, recursive=true) | to_nice_json }}\n"
    dest: "{{ ansible_env.HOME }}/.claude/settings.json"
    mode: '0644'

- name: Verify Claude Code CLI installation
  ansible.builtin.shell: |
    export PATH="$HOME/.local/bin:$PATH"
    claude --version
  args:
    executable: /bin/bash
  register: claude_version_output
  changed_when: false
  failed_when: false

- name: Display Claude Code CLI version
  ansible.builtin.debug:
    msg: "Claude Code CLI installed: {{ claude_version_output.stdout }}"
  when: not ansible_check_mode and claude_version_output.stdout | default('') | length > 0
