---
# Neovim role - Install Neovim with basic configuration

- name: Remove vim and vim-tiny (Linux)
  ansible.builtin.package:
    name:
      - vim
      - vim-tiny
    state: absent
  become: true
  when: ansible_os_family == "Debian"

# Distro/PPA packages lag behind (Debian 13 ships 0.10.x, LazyVim needs >= 0.11.2),
# so install pinned official release tarballs instead, like eza and lazygit.
- name: Remove Neovim PPA (Ubuntu/Pop!_OS)
  ansible.builtin.apt_repository:
    repo: ppa:neovim-ppa/unstable
    state: absent
  become: true
  when: ansible_distribution in ["Ubuntu", "Pop!_OS"]

- name: Remove distro Neovim package (Linux)
  ansible.builtin.package:
    name: neovim
    state: absent
  become: true
  when: ansible_os_family == "Debian"

- name: Set Neovim platform architecture (Linux)
  ansible.builtin.set_fact:
    neovim_arch: "{{ 'x86_64' if ansible_architecture == 'x86_64' else 'arm64' }}"
  when: ansible_os_family == "Debian"

- name: Check if Neovim is installed (Linux)
  ansible.builtin.stat:
    path: /opt/nvim/bin/nvim
  register: neovim_binary
  when: ansible_os_family == "Debian"

- name: Get installed Neovim version (Linux)
  ansible.builtin.command: /opt/nvim/bin/nvim --version
  register: installed_neovim_version
  changed_when: false
  failed_when: false
  when: ansible_os_family == "Debian" and neovim_binary.stat.exists

- name: Set Neovim needs installation flag (Linux)
  ansible.builtin.set_fact:
    neovim_needs_install: "{{ not neovim_binary.stat.exists or neovim_version not in (installed_neovim_version.stdout | default('')) }}"
  when: ansible_os_family == "Debian"

- name: Download Neovim (Linux)
  ansible.builtin.get_url:
    url: "https://github.com/neovim/neovim/releases/download/v{{ neovim_version }}/nvim-linux-{{ neovim_arch }}.tar.gz"
    dest: "/tmp/nvim_{{ neovim_version }}.tar.gz"
    mode: "0644"
    timeout: 30
  when: ansible_os_family == "Debian" and neovim_needs_install

- name: Remove previous Neovim install (Linux)
  ansible.builtin.file:
    path: /opt/nvim
    state: absent
  become: true
  when: ansible_os_family == "Debian" and neovim_needs_install

- name: Create Neovim install directory (Linux)
  ansible.builtin.file:
    path: /opt/nvim
    state: directory
    mode: "0755"
  become: true
  when: ansible_os_family == "Debian" and neovim_needs_install

- name: Extract Neovim (Linux)
  ansible.builtin.unarchive:
    src: "/tmp/nvim_{{ neovim_version }}.tar.gz"
    dest: /opt/nvim
    remote_src: true
    extra_opts:
      - --strip-components=1
  become: true
  when: ansible_os_family == "Debian" and neovim_needs_install

- name: Symlink nvim into /usr/local/bin (Linux)
  ansible.builtin.file:
    src: /opt/nvim/bin/nvim
    dest: /usr/local/bin/nvim
    state: link
  become: true
  when: ansible_os_family == "Debian"

- name: Clean up Neovim tarball (Linux)
  ansible.builtin.file:
    path: "/tmp/nvim_{{ neovim_version }}.tar.gz"
    state: absent
  when: ansible_os_family == "Debian" and neovim_needs_install

- name: Install Neovim (macOS)
  community.general.homebrew:
    name: neovim
    state: present
  when: ansible_os_family == "Darwin"

- name: Check if Neovim config is a git repo
  ansible.builtin.stat:
    path: "{{ neovim_config_dir }}/.git"
  register: neovim_config_git

- name: Remove Neovim config directory if it was a git clone
  ansible.builtin.file:
    path: "{{ neovim_config_dir }}"
    state: absent
  when: neovim_config_git.stat.exists

- name: Deploy Neovim configuration
  ansible.builtin.copy:
    src: files/
    dest: "{{ neovim_config_dir }}/"
    mode: preserve

# timeout: a headless nvim waiting on an interactive prompt would otherwise hang forever
- name: Install lazy.nvim and plugins
  ansible.builtin.command: nvim --headless "+Lazy! sync" +qa
  register: nvim_plugin_install
  changed_when: nvim_plugin_install.rc == 0
  failed_when: false
  timeout: 900

- name: Set nvim as default editor system-wide (Linux)
  ansible.builtin.lineinfile:
    path: /etc/environment
    regexp: '^EDITOR='
    line: 'EDITOR=nvim'
    state: present
  become: true
  when: ansible_os_family == "Debian"

- name: Set nvim as default VISUAL editor system-wide (Linux)
  ansible.builtin.lineinfile:
    path: /etc/environment
    regexp: '^VISUAL='
    line: 'VISUAL=nvim'
    state: present
  become: true
  when: ansible_os_family == "Debian"

- name: Update alternatives for editor to nvim (Linux)
  community.general.alternatives:
    name: editor
    path: /usr/bin/nvim
  become: true
  failed_when: false
  when: ansible_os_family == "Debian"

- name: Update alternatives for vi to nvim (Linux)
  community.general.alternatives:
    name: vi
    path: /usr/bin/nvim
  become: true
  failed_when: false
  when: ansible_os_family == "Debian"
