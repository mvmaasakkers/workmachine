# Alacritty Configuration
# Cross-platform config for Linux (Pop!_OS/Ubuntu) and macOS
# 
# This config uses platform-specific imports for font sizes:
# - Linux: import linux.toml (font size 11)
# - macOS: import macos.toml (font size 13, option_as_alt)
#
# Fonts installed via workmachine Ansible:
# - Hack Nerd Font Mono (primary)
# - JetBrainsMono Nerd Font
# - FiraCode Nerd Font
# - MesloLGS Nerd Font

# =============================================================================
# PLATFORM-SPECIFIC IMPORTS
# =============================================================================
# Alacritty will only import files that exist, making this cross-platform safe.
# Create the appropriate file for your platform.

[general]
import = [
    "~/.config/alacritty/linux.toml",
    "~/.config/alacritty/macos.toml",
]

# =============================================================================
# FONT CONFIGURATION
# =============================================================================
# Using Hack Nerd Font Mono for proper powerline/icon support.
# Font size is set in platform-specific files; this is the fallback.

[font]
size = 12.0

[font.normal]
family = "Hack Nerd Font Mono"
style = "Regular"

[font.bold]
family = "Hack Nerd Font Mono"
style = "Bold"

[font.italic]
family = "Hack Nerd Font Mono"
style = "Italic"

[font.bold_italic]
family = "Hack Nerd Font Mono"
style = "Bold Italic"

# =============================================================================
# WINDOW CONFIGURATION
# =============================================================================

[window]
# Padding adds breathing room around terminal content
padding = { x = 8, y = 8 }

# macOS only: Treat Option key as Alt for terminal navigation (Option+Arrow = word jump)
# Values: "OnlyLeft" | "OnlyRight" | "Both" | "None" (default)
option_as_alt = "Both"

# Window opacity (1.0 = fully opaque)
opacity = 1.0

# Window decorations: "Full" | "None" | "Transparent" | "Buttonless"
decorations = "Full"

# Startup mode: "Windowed" | "Maximized" | "Fullscreen"
startup_mode = "Windowed"

# Dynamic title based on running program
dynamic_title = true

# =============================================================================
# CURSOR CONFIGURATION
# =============================================================================

[cursor]
# Cursor style: "Block" | "Underline" | "Beam"
style = { shape = "Block", blinking = "Off" }

# Hollow cursor when window is unfocused
unfocused_hollow = true

# =============================================================================
# SCROLLING
# =============================================================================

[scrolling]
# Maximum lines in scrollback buffer
history = 10000

# Scroll multiplier (lines per scroll event)
multiplier = 3

# =============================================================================
# SELECTION
# =============================================================================

[selection]
# Characters considered part of a word for double-click selection
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

# Copy selected text to clipboard automatically
save_to_clipboard = true

# =============================================================================
# TERMINAL SETTINGS
# =============================================================================

[terminal]
# OSC 52 clipboard handling
osc52 = "CopyPaste"

# =============================================================================
# COLORS - Catppuccin Latte
# =============================================================================
# Matches tmux Catppuccin Latte theme for visual consistency.
# Official colors from: https://github.com/catppuccin/alacritty

[colors.primary]
background = "#eff1f5"
foreground = "#4c4f69"
dim_foreground = "#8c8fa1"
bright_foreground = "#4c4f69"

[colors.cursor]
text = "#eff1f5"
cursor = "#dc8a78"

[colors.vi_mode_cursor]
text = "#eff1f5"
cursor = "#7287fd"

[colors.search.matches]
foreground = "#eff1f5"
background = "#acb0be"

[colors.search.focused_match]
foreground = "#eff1f5"
background = "#40a02b"

[colors.footer_bar]
foreground = "#eff1f5"
background = "#acb0be"

[colors.hints.start]
foreground = "#eff1f5"
background = "#df8e1d"

[colors.hints.end]
foreground = "#eff1f5"
background = "#acb0be"

[colors.selection]
text = "#eff1f5"
background = "#dc8a78"

[colors.normal]
black = "#5c5f77"
red = "#d20f39"
green = "#40a02b"
yellow = "#df8e1d"
blue = "#1e66f5"
magenta = "#ea76cb"
cyan = "#179299"
white = "#acb0be"

[colors.bright]
black = "#6c6f85"
red = "#d20f39"
green = "#40a02b"
yellow = "#df8e1d"
blue = "#1e66f5"
magenta = "#ea76cb"
cyan = "#179299"
white = "#bcc0cc"

[[colors.indexed_colors]]
index = 16
color = "#fe640b"

[[colors.indexed_colors]]
index = 17
color = "#dc8a78"

# =============================================================================
# KEYBOARD SHORTCUTS
# =============================================================================
# Common shortcuts that work well across platforms.
# Platform-specific shortcuts can be added in linux.toml / macos.toml.

[[keyboard.bindings]]
# Clear scrollback and screen (Ctrl+Shift+K)
key = "K"
mods = "Control|Shift"
action = "ClearHistory"

[[keyboard.bindings]]
# Search backward (Ctrl+Shift+F)
key = "F"
mods = "Control|Shift"
action = "SearchForward"
